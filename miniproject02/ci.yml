# =============================================================================
# .github/workflows/ci.yml – CI pipeline for Prime Lands platform
# Placement: .github/workflows/ci.yml
# =============================================================================

name: Prime Lands CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Format Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

  # ---------------------------------------------------------------------------
  # Unit Tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test dependencies
        run: |
          pip install uv
          uv pip install \
            pytest pytest-cov pytest-asyncio pytest-timeout \
            langchain langchain-community langchain-text-splitters \
            langchain-qdrant langchain-huggingface \
            qdrant-client tiktoken pandas numpy scikit-learn \
            sentence-transformers pydantic python-dotenv pyyaml \
            langchain-core

      - name: Create minimal .env for tests
        run: |
          echo "OPENAI_API_KEY=test-key-for-ci" >> .env
          echo "COHERE_API_KEY=test-key-for-ci" >> .env

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -m "not integration and not network" \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Docker Build Check
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t primelands-api:${{ github.sha }} .

      - name: Smoke test the image
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=test \
            primelands-api:${{ github.sha }} \
            python -c "import langchain; import qdrant_client; print('Imports OK')"
