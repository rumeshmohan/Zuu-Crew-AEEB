# =============================================================================
# pytest.ini – pytest configuration for Prime Lands test suite
# Placement: pytest.ini  (project root)
# =============================================================================

[pytest]
pythonpath = src
asyncio_mode = auto

# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Markers
# ---------------------------------------------------------------------------
markers =
    integration: end-to-end tests requiring running services (deselect with -m "not integration")
    slow: tests that take >10 s
    network: tests that make real network calls

# ---------------------------------------------------------------------------
# Default options
# ---------------------------------------------------------------------------
addopts =
    -ra
    --strict-markers
    --tb=short

# ---------------------------------------------------------------------------
# Timeout (requires pytest-timeout)
# ---------------------------------------------------------------------------
timeout = 60